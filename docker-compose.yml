version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgres://user:password@db:5432/mydatabase
    volumes:
      - .:/app
    networks:
      - ticketcool-network

  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydatabase
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - ticketcool-network

networks:
  ticketcool-network:

volumes:
  db_data: