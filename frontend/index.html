<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ticketcool Booking Platform - Flight Booking Made Easy">
    <link rel="stylesheet" href="css/style.css">
    <title>Ticketcool - Flight Booking</title>
</head>
<body>
    <header>
        <h1>Welcome to Ticketcool</h1>
        <nav>
            <ul>
                <li><a href="#search">Search Flights</a></li>
                <li><a href="#login">Login</a></li>
                <li><a href="#register">Register</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="search">
            <h2>Search Flights</h2>
            <form id="flight-search-form">
                <input type="text" placeholder="From" required />
                <input type="text" placeholder="To" required />
                <input type="date" required />
                <button type="submit">Search</button>
            </form>
            <div id="flight-results"></div>
        </section>
        <section id="login">
            <h2>Login</h2>
            <form id="login-form">
                <input type="email" placeholder="Email" required />
                <input type="password" placeholder="Password" required />
                <button type="submit">Login</button>
            </form>
        </section>
        <section id="register">
            <h2>Register</h2>
            <form id="register-form">
                <input type="text" placeholder="Full Name" required />
                <input type="email" placeholder="Email" required />
                <input type="password" placeholder="Password" required />
                <button type="submit">Register</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Ticketcool. All rights reserved.</p>
    </footer>
    <script src="js/app.js"></script>
</body>
</html>
